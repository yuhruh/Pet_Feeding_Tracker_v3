services:
 - type: redis
   name: pet_feeding_tracker_v3
   ipAllowList: []
   plan: free
   maxmemoryPolicy: allkeys-lfu
 - type: web
   name: pet_feeding_tracker_v3
   runtime: ruby
   region: ohio
   buildCommand: "./bin/render-build.sh"
  #  startCommand: "bundle exec puma -C config/puma.rb"
   startCommand: './bin/rails server'
   envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pet_feeding_tracker_v3-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2
databases:
  - name: pet_feeding_tracker_v3-db
    plan: free