ja:
  pages:
    about:
      about_aji: "About"
      note: "猫の食事行動についてもっと知りたい場合は、専門家に相談することを強くお勧めします。個人的には、"
      paragraph1: "このアプリは、私のいたずら好きな猫、アジに触発されました。アジは、驚くほど好き嫌いの激しいジンジャー＆ホワイトの毛玉です。ほとんどのジンジャー猫とは異なり、アジには独自の好みがあります。たとえば、彼はマグロやサーモンよりも鶏肉が大好きです。"
      paragraph2: "どうしてわかるの？私は彼の食事をExcelシートで追跡していましたが、時間が経つにつれてパターンに気づき始めました。彼が気に入らないものを出すと…彼は食事を完全にスキップします（私：😅）。"
      paragraph3: "あなたは私が彼を甘やかしていると言うかもしれません—そしてあなたは絶対に正しいです。私はアジが大好きで、彼に毎回の食事を楽しんでもらいたいです。しかし、Excelを使用するのは面倒でした—すべての入力は手動で、時間の経過とともに傾向を視覚化する簡単な方法はありませんでした。そこで、私はこのアプリを構築しました。食事を追跡し、好みを見つけ、アジを十分に栄養を与えて幸せに保つためのよりスマートな方法です。"
      paragraph4: "✨ 私に参加しませんか？サインアップして自分で試してみてください："
      petbuddy: "ペットバディ猫行動、LLC"
      signup: "サインアップ"
    started:
      get_started_title: "猫の給餌トラッカーV3を始めましょう🐾"
      welcome_message: "猫の給餌トラッカーV3へようこそ！これらの簡単な手順に従って、猫の😸食事の習慣を監視し、貴重な洞察を得てください。"
      step1_title: "ステップ1：アプリケーションにアクセスする"
      step1_description_html: "Webブラウザを開き、アプリのホームページに移動します："
      step1_link: "猫の給餌トラッカーV3"
      step2_title: "ステップ2：サインアップまたはログイン"
      step2_description: "追跡を開始するには、アカウントが必要です。"
      new_user_tip: "新規ユーザー：ナビゲーションバーで「サインアップ」ボタン/リンクを探します。それをクリックし、プロンプトに従って新しいアカウントを登録します。これには通常、メールアドレスの提供とパスワードの作成が含まれます。タイムゾーンはこのプロセス中に設定される可能性があります。"
      existing_user_tip: "既存のユーザー：「ログイン」ボタン/リンクをクリックし、資格情報を入力してダッシュボードにアクセスします。（下の画像のように表示されます）"
      step3_title: "ステップ3：最初のペットを追加する"
      step3_description: "ログインしたら、最初にやりたいことは猫のプロフィールを追加することかもしれません。これをスキップして後で追加することもできます。このアプリは複数の猫の追跡をサポートしています。これがペット追加フォームの見た目です："
      step3_dropdown_instruction: "ダッシュボードまたはホーム画面で、「プロフィール[登録したユーザー名]」のドロップダウンを探し、最初の項目「ペットを追加」を探します。それをクリックし、猫に必要な詳細（名前、誕生日、性別、品種、体重など）を入力します。ペットのプロフィールを保存します。"
      step3_after_add: "最初のペットを追加すると、関連アイテムがナビゲーションバーに表示されます。"
      step3_before_add: "ペットを追加する前は、ナビゲーションバーは次のようになります："
      step4_title: "ステップ4：最初の給餌を記録する"
      step4_intro: "猫のプロフィールが設定されたら、最初の食事を記録する準備が整いました。"
      step4_tracker_nav: "「トラッカー記録」ドロップダウンから猫の追跡ページに移動し、猫の名前を選択します。"
      auto_datetime: "自動日時：これらはおそらくあなたのために事前に入力されます。"
      feeding_details: "給餌詳細の入力：餌の量を入力し、該当する場合は猫が食べに戻ってきた時間を入力します。給餌場所にカメラ📷を設置すると役立ちます。"
      visual_reminder: "（視覚的なリマインダー！）次の合図に注意してください："
      red_background: "赤い背景は、「残りの量」を記入する必要があることを示します。"
      yellow_background: "黄色い背景は、「食べに戻ってきた時間」を入力する必要があることを示唆しています。"
      save_action: "保存：「保存」または「給餌を追加」をクリックしてエントリを記録します。"
      step5_title: "ステップ5：探索と追跡！"
      step5_log_more: "最初の給餌を正常に記録しました！エントリを追加し続けて記録を作成してください。"
      step5_explore: "チャートを調べて、猫の食事パターンと量の経時変化を視覚化します。"
      add_more_pets: "他にもペットがいる場合は、追加できます。"
      manage_info: "「編集」および「削除」オプションを使用して、給餌記録、ペットのプロフィール、またはユーザー情報を管理します。"
      closing: "猫の健康と食事管理の旅を楽しんでください！🐾🐾"
