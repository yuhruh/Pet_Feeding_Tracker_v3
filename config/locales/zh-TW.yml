zh-TW:
  pages:
    about:
      about_aji: 關於阿吉飲食記錄
      note: '如果你對貓咪的飲食行為有興趣，想了解更多，請諮詢專業人士: '
      paragraph1: 這個應用程式的靈感來自於調皮的阿吉 —— 一隻橘白相間、口味超挑的可愛惡魔貓。和大多數的橘貓不同，阿吉有自己獨特的偏好。例如，比起鮪魚或鮭魚,他更愛雞肉。
      paragraph2: "我怎麼知道的呢？我目前用Excel記錄阿吉的每一餐，我慢慢發現阿吉一些飲食上的模式及喜好。如果我給他他不喜歡或不愛的食物……他寧願不吃一直喵喵叫（我：😅）。"
      paragraph3: 你可能會說我寵壞阿吉了 —— 沒錯，我就是這麼愛阿吉。我希望阿吉每一餐都能開心地吃飯，但用Excel太過麻煩而且每筆都得手動輸入，
        也無法輕易看出長期的飲食趨勢。於是我自己動手做了這個應用程式：一個更有效率的方式來記錄餐點、找出喜好，並確保阿吉每餐都可以吃得開心又健康。
      paragraph4: "✨ 想加入我一起記錄你家貓咪的吃貨日常嗎？立即註冊試用看看吧："
      petbuddy: 貼心毛寶:貓行為諮商與訓練
      signup: 註冊
    started:
      get_started_title: "開始使用貓咪餵食飲食記錄 第二版 🐾"
      welcome_message: "歡迎使用貓咪餵食飲食記錄 第二版！請依照以下簡單步驟開始監控您的貓咪😸的飲食習慣並獲得有價值的見解。"
      step1_title: "步驟一：進入應用程式"
      step1_description_html: "打開您的瀏覽器，前往應用程式首頁："
      step1_link: "貓咪餵食飲食記錄 第二版"
      step2_title: "步驟二：註冊或登入"
      step2_description: "開始追蹤之前，您需要先建立帳號。"
      new_user_tip: "新用戶：請在導覽列中尋找「註冊」按鈕或連結，點選後依照指示註冊新帳號。通常包括提供電子郵件地址並建立密碼，您的時區會在此過程中自動設定。(如下圖所示)"
      existing_user_tip: "已有帳號的用戶：請點選「登入」按鈕，輸入您的帳號與密碼即可進入飲食紀錄。"
      step3_title: "步驟三：新增第一隻寵物"
      step3_description: "登入後，您可以建立貓咪的個人資料，也可以稍後再新增。本應用程式支援多貓咪追蹤。以下是新增寵物資料的畫面："
      step3_dropdown_instruction: "在首頁導覽列上，尋找下拉選單「個人檔案 [您的註冊用戶名]」，第一個項目「新增寵物」。點選後輸入貓咪的必要資料（例如：姓名、生日、性別、品種、體重等），並儲存貓咪的個人檔案。"
      step3_after_add: "新增第一隻寵物後，導覽列會顯示相關項目。"
      step3_before_add: "新增寵物前，導覽列會像這樣："
      step4_title: "步驟四：記錄第一次餵食"
      step4_intro: "當貓咪資料建立完成後，您就可以開始記錄第一次的餵食紀錄。"
      step4_tracker_nav: "從「追蹤紀錄」下拉選單選擇貓咪名稱，即可進入該貓咪的餵食頁面。"
      auto_datetime: "自動日期與時間：系統通常會自動填入。"
      feeding_details: "填寫餵食細節：請輸入餵食量，若有回來吃的時間也請填寫。建議您在放置食物的地方安裝攝影機 📷，以便記錄。"
      visual_reminder: "（視覺提醒）請注意以下顏色提示："
      red_background: "紅色背景代表需要填寫「剩餘量」。"
      yellow_background: "黃色背景表示應填寫「回來吃的時間」。"
      save_action: "儲存：點選「儲存」或「新增餵食」來完成記錄。"
      step5_title: "步驟五：探索與追蹤！"
      step5_log_more: "您已成功記錄第一次餵食！繼續新增餵食紀錄吧～"
      step5_explore: "瀏覽圖表，了解貓咪隨時間變化的飲食模式與進食趨勢。"
      add_more_pets: "若您有多隻貓咪，可繼續新增。"
      manage_info: "透過「編輯」與「刪除」功能管理您的餵食紀錄、寵物資料與帳戶資訊。"
      closing: "祝您順利追蹤貓咪的健康與飲食之旅 🐾🐾"
