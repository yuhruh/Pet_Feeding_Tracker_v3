en:
  pages:
    about:
      about_aji: "About"
      note: "If you're interested in learning more about cat eating behavior, I highly
        recommend consulting a professional. I personally found great insights from "
      paragraph1: "This app was inspired by my mischievous cat, Aji — a ginger-and-white
        furball with a surprisingly picky palate. Unlike most ginger cats, Aji has
        his own unique favorites. For example, he loves chicken more than tuna or
        salmon."
      paragraph2: "How do I know? I used to track his meals in an Excel sheet, and
        over time, I started noticing patterns. If I served him something he didn’t
        like… he’d skip the meal entirely (me: 😅)."
      paragraph3: "You might say I spoil him — and you''d be absolutely right. I love
        Aji, and I want him to enjoy every single meal. But using Excel was tedious
        — every input was manual, and there was no easy way to visualize trends over
        time. So, I built this app: a smarter way to track meals, spot preferences,
        and keep Aji well-fed and happy."
      paragraph4: "✨ Want to join me? Sign up and try it yourself: "
      petbuddy: "Pet Buddy Cat Behavior, LLC"
      signup: "Sign Up"
